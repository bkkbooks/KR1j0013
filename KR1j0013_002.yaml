body:
  text: 欽定四庫全書駢雅卷二明朱謀㙔撰釋訓紛怡已怤愉闓懌梁憐職欨㰭㦀憹嘔喻忥忥欯欯􅧈􅧈嘕嘕悦樂也薄努勔釗閔免侔莫文莫食閻密勿蠠沒懋懋慔慔縱臾慫慂勸勉也忸怩衂怩㗤咨卑陬㥏墨儗㤰䩆㦦㥴主臣屏營正營懡㦬慙悚也􅻳沐佂伀挐玃俇攘騤瞿遑遽也脅鬩謾台㥄遽螴蜳恎㤏鰓鰓虩虩畏怖也懰慄愍師慛噬䩌悴慁憗䁮濟惄溼殷殷惸惸欽欽博博京京忡忡惙惙怲怲憂也戲欷唴喨惻愴噢咿惻惐靖領憻悷悲􅉃也覣盈魏盈菲惄漢赫輵磍敦圉彪休譀睚眦戲憚䫴悸娺㤜訮訶䖔䛎䚴怒也㗔養悰醋比憲憲忾欯喜也顮漢漫於邑鬱悒瞋菌伊鬱怫鬱愠惀悁邑愊抑唈僾鞅侼憤懣也盱䦧瑣䤈顰蹙也墊隘委頓罷潞弊攰羸困也殢􅡅疲薾劵􅡅快殙憊極也選耎遲頓㝺縻嗆哼偃佒䯟闒茸駑劣也坎壈倥傯鞅掌魁壘隕獲偪側頓萃秏悴困迫也排迮踾踧恐猲窘蹙也聉顡僋俕怐愗僋傪䪴顩倜歁歞儒輸俺戇㗔倱伅不慧也啙窳濡需萎腇萎腝惐㥓嫴媮諣蓄縮恇恗儱倲䫖䫴怯劣也貸騃褦襶搆擩䍐漫區霿不解事也央亡嚜杘詆䛢㞕無賴偛㑙狡獪也䞾騭濂竦估侸㤴􆂳脆㑙沾沾輕薄也鹵欲憛悇釐㙁欴㰠貪婪也暖姝嫥梡委隨便辟哫訾栗斯伊優儒兒睮睮夸柔媚也㦒忚譠謾儇䖍眠娗茭媞䁑滿讕侜張侏張譸張膠詑調突虞欺謾也逗遛首施首鼠夷猶冘豫猶豫虚徐莎隨依違罔養瀢湤斟椹􅞶踔遲疑也孟浪荒唐謬悠於于夸誕也炰烋彭亨橋泄夸自矜也仇仇敖敖傲慢也畔換恣雎畔援伴奐跋扈揮斥縱恣也謰謱㘓哰詁謕譇挐羞窮也喔齪趢趗握齱鮮規欵啓蕞芮窶數局趣也鹵莽倀疏率也僣傔抵贛抗竦也勜劜屈强也佛忾勇壯也倜儻不羈也卑疵閃榆阿匼傾佞也喔咿强顔也馶剄耆鬒憚憸􅳻鈔倞悖强勉也皮彈憸强聒也戲泄屖􅜃歇息也躊躇蹢䠱跢跦猶豫也鋪脾駤止也䠈趁不進也䠆􅭣隑企立也宿留稽固須待也眷奊顧也儃佪低徊也逳䠯趬趞逯遡裔裔眐眐冉冉夏夏行也趑趄難行也行遽也踾跊行迫也㣚直行也㣪徐行也緩行也徍徥邪行也相羊儴佯常羊仿佯容與儲與消揺遊適也勃㞕徶便姍嫳㞕盤姍勃窣婆娑也婩要眇汋約姗愠惀㜊奵健䫵淖約㛱娞姁媮孚瑜純毣娃隨鮮頔釥嫽䫯瞴嫢魏姽嫿妍婽䄚祖姼姼美好也仳倠娸婄䫪䫂䑏􅢦頦顝顲䪴屯欺魄領籧篨戚施醜惡也窈窕妖蠱姚冶訬婧偠紹􅝌豸娥媌便娟冶夷嫺雅㝞察眳邈姿媚也嗢噱軒渠捓揄䐘䐘盧胡笑也謡諑騫汚詆娸毁醜也汜㶄濩點汚也懀孱甜憚毒貉㒎傸疾惡也儓􅤵􅮜倯鄙賤也媯娗憎㦫怠僈也媥􅚁懱輕忽也諔詭瓌瑰逴躒卓詭奇異也矞宇嵬瑣怪僻也華離謑髁訛倪欹邪也謧詍囁嚅讘吺呢喃讋咮䜞䛽謺讘􅓪吺喋喋多言也諸諸便便辯給也􅟌㥛乹歰口吃也㦄語難也譳不能言也詀誽䫛謵讋􅨏􅨵㘆言不正也謅䜉呫囁私語也䫘哃唐揚言也譁釦㗲啨讙呼也啨呤小語也喝喇言急也譗言無次也䛬詜言語不節也諀訾好為毁譽也諵諛私詈也陶誕頑嚻也㰟覬覦睗虞靗覹企望也晼䁓偵伺賴覻闚瞰也物色訪覔也辟倪睥睨瞗矕䁓䁙䁈䀣䁹睨側目也愋諒智也惺㦟䛿了慧也椎儲拙也抗髒木彊脛脛婞直也傋頝薄頝䫨不媚也謑詬恥也懊憦悔也觖望怨懟也咄欪無慙也㖤㗅齮齕瞋憤也忊疵怊悵恨也黑敢㤿悆忽㤝腆詄㥆怽聲晪忘也悃愊質實也屬臾謹也齊栗蛩㤨謹兢兢憴憴粥粥敬懼也聊慮精心也廩廩􅐅􅐅持整也蕆敕戒備也邊幅矜持也懻忮堅强也􅘀㺓輕狡也慃佷戾也嬥嬈不仁也頨狡也畔喭剛猛也惈隘悍也旭旭蹻蹻憍蹇也檮杌憨凶頑也蚩愮悖也喫詬勜强圉多力也㑻傄矍鑠㹾犺趻踔健也豉惈勇也僄狡輕迅也惰窳不力也踧乖劣也佯㞋䦵劣懦恁㱱㱣耎弱也伶俜零丁單孑也落魄懭悢侘傺落度失志也顛冥迷惑也不斟何斟痄疨殗殜大漸病甚也嫶冥癯惵耉䂂脙瘠也䀼眩顛眴也戚醮顦顇也腫噲剥錯也跰􅓷嬴竛竮􅾎􅴃躄也顐秃也蹣跚跛也瞜睺偏盲也疻痏痕􅵅瘢也痒也漻浗龜瘃皴凍也㾰㾾喉阻也蝸睆目疾也胮肛瘇也䏨大瘇也瘁寒病也眵目汁疑也欵㰨氣逆也憑噫氣塞也䒐䒏色惡也悈鰓耉鮐乾都麋棃耉革鮐背胡耉老也即世物故登假不諱不禄死也㥄􅤷無寫翳㥛歀牟憮㤿低怟惕惕憐愛也嬈脆栠愞欿羡偄䪏斂欦将闓欲也㩊挴忨懆饕飻亄嗇歁欿利䢯貪也䭡䭓籑茹食也䭨餟餽也餼䭘飽也䭢强食也䬫餬寄食也酕醄醉極也啖欨欲食也訋訍􆅰惹䛳詯挐也攍㧡何擔也調詅䝻賺賣也倩荼借也于諸寘也謏訹誘也撟捎選取也抾摸持去也侵牟魚酌掠取也讎柞交授也龕岑資敓芼集撟穌賴摣取也拫攎引也搥擿擿也煩撋挼也摻搓捫也揾抐擩也䘏勿搔摩也舖頒抖藪也㩢揳拭滅也雍樹抱持也拮据㦸挶也唐突抵觸也䞮扶服匍匐伏也䞦䞽顛沛仆也跜婉僤衝俶擡摠動也迎走也趌􅨤趠䟑怒走也踢䟮頓伏也脅息縮氣也痀慺闉跂嫗􅯭偃僂背曲也跭􅭽竦立也降不伏也倛儗不行也聴䁿欲臥也咍臺鼾睡也啽囈寤語也廞熙興也苦㕟棲遲息也豫射厭也倫勩邛敕勤愉庸癉勞也艾歴覛胥相也賡揚續也貉嗼安定也􅰾􅨣審諟也閥閲自序也旭卉難知也􅭵喋深算也覆逆科量也故敠稱量也䛳消克當也逕庭激過也滑涽未定也梗槩商榷大較無慮揚榷大要也録録鹿鹿娽娽陸陸碌碌隨從也嬋媛牽引也徼􅵍受屈也題帖標牓也斧藻修飾也愅詭變易也精揺精進也嫇奵自持也依韋順從也􅰿互沮格也掉磬相絞計也儻􅛅肫䐾不檢也魭斷無圭角也㩢不方正也骨鯁持正也魁岸倨偉也鬱悠思念也惆悵悲哀也憭慄悽愴也抷治恨不得也慏悜意不盡也喬詰意不平也昆千􆒔于不可知也奊詬無志分也乾沒射成敗也拘覰未致密也歍􅩃有所惡也㑮陽不知也儢拒隂却也登來求得也苛縟煩數也誒詒懈倦也錯倉卒也懛獃敞怳也謥詷遽也牚距抵梧也欻吸須揺少選倐敻揮霍咄嗟窋咤斯須咋唶奄忽俄頃也綽惹陜輸不定也勿罔不審也方皇徘徊也倚魁偏妄也狙詐權變也紛繷不善也怑愌不順也愝狹急也燠咻痛念聲也輿謣勸力聲也語笑聲也欵乃靄迺靄囉唻旁喻歌聲也䵷咬嗌喔嘈囋淫豔聲也唸㕧殿屎通喚呻恫呻吟也感概徇私恩也悇覃懐憂也繜絀貶損也弚靡遜伏也憑陵依據也彈壓摧迮也忸􅏸䃷裔習也宵使也抱㛯耦也掊扟減也頡逆也介倪那倪也樸屬附著也流宂散亡也漠􅓦寞也􅞶踔無常也櫟銚㦎釽摫裁制也駢雅卷二
