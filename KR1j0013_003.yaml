body:
  text: 欽定四庫全書駢雅卷三明朱謀㙔撰釋名稱王父王母祖父母也嚴君父母也􅺊嬭毑􅺊母也世父伯父也鼻祖始祖也太髙祖先也夫之父曰君舅母曰君姑曰尊章曰威姑夫之庶母曰少姑夫之兄曰兄公姊曰女公妻之父母曰外舅外姑孫之子一世為曾孫二世為玄孫三世為來孫一曰耳孫四世為晜孫五世為仍孫六世為雲孫姪之子為歸孫女子之孫為外孫姊妹之孫為離孫於父之舅氏自稱曰彌甥長子謂之家督主婦謂之君婦夫婦相稱為伉儷兩壻相稱為友壻諸婦相稱為妯娌嫕婗嫕彌嬰兒也釐孳孿生也苗裔逺胄也右親屬元首至尊君也黎苗黔首元元黎蒸民也百揆冢宰天官吏部也司徒地官度支戶部也宗伯秩宗春官禮部也司馬兵部也司冦刑部也司空工部也大司憲都御史也奉常太常也司宰司膳光祿也司僕司馭太僕也廷尉祥刑大理也司賔鴻臚也司成祭酒也端尹詹事也蘭臺祕書翰林也內史中書也三公太師太傅太保也三孤少師少傅少保也中宫皇后也漢制帝祖母稱長信宫帝母稱長樂宫婕妤容華娙娥充衣昭儀順常無涓共和娛靈寶林良使夜者兩漢時女官也貴嬪淑媛修容順成良人昭華修儀淑儀充華魏晉時女官也承徽列榮梁時女官也良娣孺子保林才人皆太子嬪妾也右君臣望獲天皇也嶽鏗地皇也愷胡洮人皇也侯岡頡史皇氏倉頡也柏芝柏皇氏也釐連釐蓄昆連氏也赫蘇赫胥氏也權天葛天氏也祝誦祝和祝融氏也古皇有巢氏也方牙蒼牙包羲太昊也女希女媧氏也石年神農也玄律黃帝也紀質少昊也明由必育成博隕邱燧人氏四佐也金提鳥明視默紀通仲起陽矦伏羲氏六佐也風后天老五聖知命窺紀地典力墨黃帝七輔也雄陶方回續牙伯陽東不訾秦不虛靈甫舜之七友也皋陶化益真窺橫革之交禹之五佐也陶臣繇余烏陀治洚水之三佐也離朱之明䚦俞之聰狄牙之味甘蠅飛衛之射鉗旦大丙之御僦貸李俞跗之醫孟賁成荆烏獲荆慶之勇白台閭須南威先施毛嬙閭娵陽文闕傅豫孟陬之美皆古之殊絶者嫫母隴廉倭傀仳倠鬷蔑哀駘他敦洽古之醜人也竫人巨靈周饒僬僥短小人也蒲衣項橐任賢張堪古之聖童也東南有人長七丈名曰尺郭一名黃父西北有人長二千里名曰無路西南荒有人長丈名曰先通東南荒有人長千里名曰朴父天竺車鄰之國男女皆長丈八尺大秦國人皆丈五尺親􅶔籧篨侏儒焦僥啞瘖僮昏聾瞶矇􅕓謂之八疾頰車鼸車頰輔也承漿口下也立人鼻下也軍營華池口也玄府腠理也隱器廷孔前隂也魄門榖道也天癸月容姅變月事也嚨㗅咽語也􅦃皰鼻息也疣贅結肉也釋宫長樂未央長門鼓篁宜春承光池陽黃平黃山望仙長楊集賢延夀祈年通天馺娑林光甘泉交門明光五柞萬嵗太乙建章夜光棠梨扶荔鼎湖西漢宫名也徽行顯陽暉章含章仁夀百福清暑章華嘉福宣光明修嘉樂蔬圃九華章陽芳德景福延休百子虞清淵冥安昌式乾林光漢晉殿名也蘭池平樂象章鳷鵲華光流渠相思長平華池迎風露寒鼎效漢觀名也宣平萬秋青綺夀成漢長安城門也大夏閶闔萬春長秋金牙鴻都章臺濯龍洛陽城門也金華清陽承休朱明白藏顯仁飛雲晉閣名也象魏闕也堂隍合殿也辟雍頖宫瞽宗東成均國學也天子牆曰賁庸諸侯曰疏杼旅樹門屏也梐枑行馬也埤堄女牆也杗廇梁也落時樞達也掇儒短柱也聯櫋屋梠也壁帶欂也罦罳屏也扊扅笠㧀戶牡也鋪首鏂銗門鐶也承塵仰塵也摶辟席壁也綺疏白間文窗也石材石承礎碏也藻井刻扉也廜蘇平屋也柍桭屋專也閨竇小户也蘧廬傳舍也􅜋同巷也易瘌庵也欏落㯫栫地籬也華表柱識也柤㳻隁也匽豬霤下也岐旁劇旁劇驂崇期岐路也瓴甋令辟㽃瓳甓㼾甎也㼧小瓦也㼿㼣井甃也鴟尾瓦獸也夏臺羑里念室動止稽留狴牢圜土因諸若盧居室囹圄獄也楲竇溷軒行清糞厠也闉闍城門曲也釋服食天子祀天以蒼冕祀地以黃冕朝日以青冕夕月以素冕社稷以玄冕享先帝食三老耕籍以袞冕視朔大射以山冕視朝適宴以鷩冕皆十二旒諸公以下有方冕火冕毳冕藻冕絺冕爵辨韋辨皮辨玄冠祀辨毋追章甫委貌三代禮冠也進賢惠文側注柱後法冠也通天逺遊髙山建華方山巧士却非却敵翼善漢以來禮冠也禕衣揄翟闕翟鞠衣展衣禒衣素沙王后以下六服也小祀則服鷩衣採桑則衣聽女教則鵫衣歸寧則翐衣􅥗褣䘪䘿襜褕屈掖直裾衣也短者謂之裋褕襜裿襌襦也筒褹復襦也反閉小襦也甲襜秪裯汗襦也鄙袒羞袒汗衣也諸于逢掖大袂衣也裲襠袹腹胸背衣也留幕大褶衣也褒明袍也復陶羽衣也褚衣綿衣也􆃣􅵄襌衣也帹㒾㒾羃㒿帹帞面衣也襏襫農服也跗注戎服也㡈喪服也繦褓兒襆也繞襟裙也褘袡蔽膝也倒頓䘨􅤨毋繜袴也窮褲袒犢襣褌也裷襎襪也􅴿􅶶鞾也􅝿靴鞨革履也下不借薄借䩕角草履也􅫜䩣屧也鮮支繁繐䋷􅵃葉褕絹縠也方空吹綸輕容細紗也服瑣緰㠿黃潤升越花練細布也青頓毞毲帛疊綩􅽩黎單夷布也㲔翅細褐也氍毼毭􅪭搪㲨氀毼眊罽也氍毹毾㲪㲖毛席也氍毛褥也䯷氀毳布也承露覆䰂睫㰚幘巾也襎裷帊幞也陌頭鈔髮綃頭也􅔮繒頭也􆒕裱領巾也裪􅰁𢃗䘷褎也偏諸衣緣也襞積衣褶也刺針縫也絽䌎䌜紩衣也襤褸褸裂裉褬衣敝壞也裺繞䋸衣督脊也覆祽䙕褋單衣也䌯帉幘也春草雞翹蒸栗鬱金愧幃麴塵緑綟紫綟無綦綺留黃綵色也紷綼絮也縴􅮗惡絮也牽籬繭幕也步搖珠松也跳脫臂釧也花鈿面飾也射月粉靨也額黃眉邊飾也衵服寶襪腰綵也黍酏麩䊕毇糮飦粥也􅲐􆒖粟粥也糗也􅲄䤓麥也麥皮也䊞損米也牢九麵起水引薄夜起溲糾耳狗后劍帶案成髓爥􅢑􅞻餦餛鬬飣餅屬也糖䬾溏浹糖餔粉餅也摶爐胡餅也煮餅也餛飩畢羅餺飥餈食也䴺􅲑麧餅也粔籹安乾膏環也角黍筒粽也麩􅦴饊也臉䑎羮也䬫糊醍醐美酥也􅪈蠡乾酪也䣫乳腐也玄酒清滌水也䣯􅮢美漿也女䴷甜醹丸投澄清濛醥瓊蘇琬液泛齊醴齊盎齊緹齊沈齊酒也梅麴酒母也䬵􅦑餦餭餳也䤉􅟍􅛙䤅䤎䣼醬也臡醢肉醬也䴛䴝鹹鹺鹽也䴭䴳䴽牟䤓麴也豚拍彘肩也脾析牛百葉也膍胵鳥胃也刑膴夾脊肉也胓牛羊脂也膟䁝腸間脂也宫脂鹿脂也圂腴豬犬腸也􆒗脪牛馬子腸也肯綮筋骨結也臎也散臑前肩也句藥調和也腤腩調飪也味苦也䣸味醨也澉䭕􅷮􅲃無味也醭䤍醬酢白也􅶽蘫瓜葅也昌歜昌蒲葅也乾䕩烏梅也大苦豉也駢雅卷三
