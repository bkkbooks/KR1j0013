body:
  text: 欽定四庫全書經部十駢雅小學類一訓詁之屬提要臣等謹案駢雅七卷明朱謀㙔撰謀㙔有周易象通已著録此書皆刺取古書文句典奥者依爾雅體例分章訓釋自釋詁釋訓以至蟲魚鳥獸凡二十篇其説以為聨二為一駢異為同故名曰駢雅謀㙔淹通典籍其一齋書目所載往往為諸家所未窺故徴引詳博頗具條理非鄉塾陋儒捃拾殘剰者可比中間如藻井乃屋上方井刻為藻文西京賦注引風俗通訓義甚明而謀㙔以為刻扉之屬改易舊文殊為未確又謂都御史為大司憲詹事為端尹乃流俗之稱亦乏典據至如釋天内之嵗陽月名釋地内之五邱四荒太平太䝉丹穴空桐之類皆爾雅所已具乃重複徴引尤病冗蕪然竒文僻字搜輯良多擷其膏腴于詞章要不為無補也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
