body:
  text: 欽定四庫全書駢雅卷六明朱謀㙔撰釋草榜䅣穄黍也薌合黍也薌萁梁也明粢稷米也嘉蔬稻也豐本韭也雕胡安胡苽米也豇䝄胡豆也巨勝鴻藏胡麻也卑留豆也蹲鴟芋也落蘇茄也象穀米囊罌粟也幽芥菈蕪菁也須從葑也冥菁芴菁蔓青也蘆萉雹葖蘆蔔也鴻薈薤也菥蓂馬辛薺也遊冬苦菜也宜男療愁萱草也將離芍藥也日精女節周盈朱嬴更生隂成女華菭牆蘜也留夷胡繩薰陸都梁嘉夜迷迭蘼蕪上鹵杜衡揭車芞輿稿茇香草也龍仙蕪胎麻母紫珠白符龍銜五德三秀芝草也威喜飛節樊桃木渠參成木芝也馗厨㭯㰔中也菌也雞菌雞堫也萮茈木耳也月爾紫藄也􅭚􅘚蔞也遊胡菴閭旁勃彭勃蒿也扈魯觚盧也菲芴土瓜也興渠胡葷也諸柘都蔗也蕨水栗菱也澤芝芙蕖也拘羅過羅皋蘆苦茗也女青拔龍葛也扶留諸慮山櫐藤也鳥蓲菼也龍修龍須也唐蒙赤綱菟纍女蘿也鳥韭垣嬴昔邪垣衣也凌霄紫葳陵苕也堯韭昌羊菖蒲也棘菀葽繞逺志也玉精人參也鹿竹雞格黃精也地輔却暑托盧枸把也女萎馬薰地節青黏黃芝也兼杜地管茅根也銅藝百蜚防風也地新藁本也卑鹽麻黃也苻離澤芬蒚麻白芷也玉延薯蕷也林蘭禁生石蓫石斛也解蟸屋菼起實薏苡也戴糝蜀脂百本黃耆也連母蝭母水浚女雷鹿列韭逢沈䕰東根知母也地文半夏也絺體顛勒顛棘也禹葭忍陵僕壘隨脂羊耆馬韭冬也橐吾菟奚顆凍鑽凍欵冬也附支丁翁燕覆離南活脫木通也白幕天雄也果負烏頭也澤姑王善果裸括樓也利如房圖薺苨桔梗也玄臺正馬鹿腸玄參也牡蒙衆戎紫參也菟槐陵郎岑莖苦參也空腸黃芩也勝舄陵舄芣苡車前也陵澤王田甘遂也卭巨大戟也黃良大黃也南爥青籸男縷烏草也射干烏蓮也藉姑烏芋也女青烏葛也藑茅烏麩也貞蔚茺蔚益母也地葵常思枲耳也方賔懸莞石龍芻也虎蒲龍棗澤蘭也屈據離婁䕡茹也戴椹盜庚旋覆也王芻鹿蓐藎草也乃東夕句燕面夏枯草也豺羽升推蒺藜也茢薽彘顱天名精也行唐莨菪也接余鳬葵也解離防已也爵犀鬼白也挋冬續隨也梨蓋房慈爵離農果利茹防葵也玄及會及荎藸五味也餘容犂食解倉芍藥也摩羅強瞿重邁連珠百合也暌菰鉤菰挈王瓜也蔥再豐盧蕙蔡藜蘆也白昌夜呼章栁商陸也虎卷伯萍扁苻貫渠貫衆也萇楚銚弋葎草也異翹折根三廉連翹也三堅馬藺蠡實也黃斤葛榖也承膏薇銜也文無當歸也茈蔞瞿麥也赤節萆薢也玉支羊躑躅也玉豉地榆也豺漆金鹽五加皮也夜合何首烏也凌泉黃環也篷纍覆盆也氷臺艾也女菀苑也鬼目蓄也軒于蕕也夫須薹也鎬侯莎也缺盆茥也寒漿葴也祝餘療飢草也黃雚已疥草也蓇蓉使人無子植楮可以已癙葶䔭可以毒魚苦辛可以已瘧焉酸可以療毒嘉榮令人不霆宿莽卷施也牡老雀麥也龍古遊龍馬蓼也釋木麥英含桃櫻桃也仁頻檳榔也離支荔枝也般開含消美梨也溝道黃建經孝黃扁名李也駢白崎廉鹿盧名棗也蹙咨大棗也巴旦北杏也冬熟侯闥土翁枸槽猴樬多南王壇三廉文莖答遝桴苡皆小果也鹿梨赤羅檖也枍詣榏也道梓松也思仙杜仲也秦皮石檀白樳也兩師穫落柳也烏文黑水也多邦蘇枋絳木也男青朱木也青田酒木也咸平酢木也白䓘睪蘇飴木也都勾桄榔麵木也枸榔綿木也繫彌粟木也新雉侯枕辛矧木筆也朝生合昏王蒸洽容愛老日及槿也夫栘棠棣也爵李常棣郁李也越桃木舟鮮支梔子也銚芅五梭羊桃也栟閭比閭蒲葵棕也浮留蒟醬也痤椄麥李也蹶泄苦棗也守宫槐也無姑姑榆也青堂合歡也蜜香珍木也其節為沈水浮者為雞骨幹為甲棧枝為青桂實為雞舌根為黃熟根節為馬􅕭一物而七名也旃檀香木也賔連平露平慮平兩瑞木也姑繇冥靈膏夏大木也木扶桑也沙棠不沈思儡不腐女貞不凋葪柏耐寒迷榖四照楊榣七脊天楄方莖六駁多癬鬬鏤纎條黃棘貟葉播栘虛中交讓楠也無患拾櫨也胥邪棕屬也雞棲皂莢也甘棠杜梨也榠樝酢梨也木威苦果也宜母梨朦酢果也枳椇餳果也枸椽香果也倒捻念都甘果也平仲銀實帝屋赤實君遷瓠實毗野楮實羅望刀實古度不華而實子從皮出如何之實隨刀易味餘甘之子如彈丸其核五稜東枝為木威南枝為橄欖羅晃之子如橄欖其皮七出娑羅之子若椒都諦之子若榴石南之子如燕卵菴羅之子如李蘿蒙之子若橙雒常之皮可衣吉貝之花可績帝休蠲忿文莖已聾稃苡宜子木麥桑耳也梟景桃鳬也宛童寄屏寄生也齊㬑齊也子似楊桃可以壓油産拂林國阿縒沒樹也槐葉而橘花産波斯國柤架􅣮髙千丈其葉七尺其實九尺産東荒綺縞之樹髙三千丈實如寒瓜食之冥醉産東南荒底稱阿驛也無花而實産拂林國玉樹似槐而細葉榽橀似檀而細葉駢雅卷六
