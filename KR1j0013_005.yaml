body:
  text: 欽定四庫全書駢雅卷五明朱謀㙔撰釋天上𤣥太虚圓靈洪覆泰清靈曜泰元圓精天也朱明曜靈東君朱光陽烏大明日也夜光月也螮蝀挈貳虹霓也列缺䃱磹電也霆霓疾雷也天酒甘露也扶揺獨鹿旋風也石尤逆風也䬓䬔颶風也䬎熱風也舶趠海風也䬀緒風也霎㢘瀐霡霂溟涬小雨也雴霫蒦大雨也涔澬􅮕久雨也􅻫䨕暴雨也鬱華日精也結鄰月精也日御羲和月御望舒一曰纎阿折丹飛㢘風師也荓翳號雨師也豐隆雲師也光道日道也逡巡月運也日将出曰朏明将午曰禺中晡後曰髙舂将昏曰懸車日落曰桑榆側匿仄慝縮肭月朔見也埃􅧵日無光也昧爽昒昕曙也㫸䁽曛黄日暮也曣㬗日溫也昌光歸邪握譽可錯持勝履予慶雲也天衡雲旍滑馬妖雲也朝霞正陽淪隂沆并天𤣥地黄為六氣闇虚蝕月氣也重華攝提嵗星也執營惑也地侯鎮星也召明長庚太囂天相人正太白也安調伺晨鈎星熊星辰星也分野齊為𤣥枵天黿吳越為星紀燕為析木宋為大火鄭為夀星楚為鶉尾周為鶉火秦為鶉首魏為實沈趙為大梁魯為降婁衛為娵訾天闕角也疏廟亢也氐亢之間為天根房為明堂為天駟心為大火尾為九子箕為天口為天雞斗為天機牽牛為河鼔為黄姑室為清廟為結蝓奎為天豕昴為天耳為旄頭星為天都鬼為天廟北辰為天闕北斗為帝車周伯含譽景星赤矛格澤天醒瑞星也天棓天槍天猾天衝國皇及登天荆真若蒼彗也昭旦蚩尤旗昭明司危天欃天隂晉若官張天崔赤若赤彗也五殘獄漢大賁昭星絀流旬始擊咎天翟天沸黄彗也天杵天柎伏靈大敗司姦天狗天錢卒起竹彗白彗也枉矢被女拂䙔滅寳繞綎驚恐天蒿端下天林黑彗也地雁大雁頓頑解銜大滑彴約流星也太嵗所在甲曰閼逢乙曰㫋蒙丙曰柔兆丁曰强圄戊曰著雍己曰屠維庚曰上章辛曰重光壬曰𤣥黓癸曰昭陽子曰困敦丑曰赤奮若寅曰攝提格卯曰單閼辰曰執徐已曰大荒落午曰敦牂未曰協洽申曰涒灘酉曰作噩戌曰閹茂亥曰大淵獻焉逢甲也端蒙乙也游兆丙也彊梧丁也祝犂已也啇横庚也横艾壬也青陽𤼵生春也朱明長嬴夏也白藏收成秋也𤣥英安寧冬也正月為端月四月為乏月十月為暢月臘之明日為小嵗朔日為月額朔之次日為旁死魄三日為哉生明既望為哉生魄既望之明日為既生魄月晦日為提月正月一日為天臘五月五日為地臘正月十六日為枆磨冬至為長至至後百五日為寒食清祀嘉平大蜡臘日也右天時上帝耀魄寳其佐五帝曰靈威仰赤熛怒含樞紐白招拒叶光紀造化之神曰黔嬴八風所生之神條風曰諸稽攝提明庶風曰通視清明風曰赤奮若景風曰共工凉風曰諸比閶闔風曰皐稽不周風曰隅强廣莫風曰窮奇雷電之神曰缺一曰勃決人之先曰若菌禽之先曰羽嘉獸之先曰毛犢魚之先曰介鱗甲蟲之先曰介潭衆草之先曰程若衆木之先曰日馮萍藻之先曰海閭五岳之神泰山圓常龍衡山丹靈峙華山浩鬱狩恒山登僧嵩山軍夀逸羣四海之神東曰馮修青南曰視赤西曰勾大邱百北曰禹帳里江神曰奇相河伯曰氷夷一曰無夷馮遲馮夷淮神曰巫支祁波神曰陽侯游光回禄畢方火神也清明金神也沭腫罔象水神也彭侯雲陽木精也羵羊賈詘土精也超空如獨足金累如人九尺揮乂如鼓一足山之精也天吳馬銜海中神也陪阿鮭蠪泆陽彷徨四野之神也藻兼八九十如老翁水木精也故室之精曰傒龍冠幘如小兒曰兩貴如赤狗曰揮文故市之精曰毛門如囷無手足故道之精曰作器如丈夫故池牧之精曰髠頓如牛頭故厠之精曰依倚美玉之精曰委然如美女三軍之精曰賔滿隂陽變化之精曰岱委髮神夀長耳神嬌女目神珠暎鼻神勇盧齒神丹朱粟之神曰許給豆之神曰靈殖黍之神曰侜佞曲張弓神也推亡逺望弩神也續長箭神也脱光刀神也飛揚劍神也狂章斧神也馮耳孟公船神也甲作胇胃雄伯騰簡攬諸伯奇强梁祖明寄生委隨錯斷窮奇騰根赤郭黄父漸耳食鬼之神也狡猾踐􅖹札揭結梗略玃列蛸肩屈梁黨巷溏螟蜓猛諸毅魅虚魍兩方良諸渠苕蕘夔􅹹夔魖列蹷羯孽獝狂委虵耕父野仲語忘敬遺皆鬼名也鬼火為轉燐祭天曰燔柴地曰瘞霾山曰􅔑縣川曰浮沉祭祀之壇天曰泰壇一曰圓丘地曰泰折一曰方澤四時曰泰昭日曰王宫月曰夜明星曰幽宗寒暑曰坎壇釋地大九州東南神州曰農土正南次州曰沃土西南戎州曰滔土正西弇州曰并土正中冀州曰中土西北台州曰肥土正北濟州曰成土東北薄州曰隠土正東陽州曰申土九山會稽泰山王屋首山太華岐山太行羊腸孟門也九澤具區雲夢圃田望諸大野弦蒲豯養楊䊸昭余祁也九塞太汾澠阸荆阮方城殽阪井陘令疵句注居庸也九河徒駭太史馬頰覆釜胡蘇鈎盤鬲津簡河潔河也八殥東北大澤無通正東大渚少海東南吳區元澤南方大夢浩澤西南渚資丹澤正西九區泉澤西北大夏海澤正北大冥寒澤八紘東北和邱荒土正東棘林桑野東南大窮衆安正南都廣反户西南焦僥炎土正西金邱沃野西北一目少廣北方積氷委羽八極東曰泰逺曰開梧西曰邠國曰夀靡南曰濮鉛曰多􅱋北曰祝栗曰儋耳東南曰波母西南曰編駒東北曰方土西北曰不周四荒東日下西西王母南北户北觚竹日所出曰太平所入曰太蒙南戴日曰丹穴北戴斗曰空桐羣土之長為五粟其次五沃次五位次五隠次五壤次五浮種植無不宜也中土曰五怸其次五壚次五次五剽次五沙次五塥下土曰五猶其次五𢎞次五殖次五觳次五鳬次五桀騂剛赤緹彊堅土也墳壤勃壤埴壚輕爂脆土也甌㬰窳下也淳鹵舄鹵石留磽薄地也五陵東阠陵南息慎西威夷北雁門中朱膝加陵陵之大者溴梁梁之大者山之東曰朝陽西曰夕陽近上旁陂曰翠微崒者曰㕒石山戴土曰崔嵬附婁培塿堥敦魁父小土山也商小塊也岱宗泰山也天柱霍山也大崒華山也常山恒山也微閭醫無閭也崑陵崑侖也平圃𤣥圃也逴龍爥龍也咸唐咸池也渤澥天池南冥海也蒲昌蒲類鹿渾潭彌陽池西海也渤鞮伊連私渠北海也渠弭禆海也歸塘尾閭惡焦沃焦海水之所銷也泉涌出曰濫泉溜下曰沃泉仄出曰汍泉一盈一涸曰瀱汋流川曰湀闢回川曰過辨小波曰泊栢濁泥曰澱滓瓊支瑾瑜昭華白珩璇璜弁和璵璠垂棘碧瓐琜瓄琬琰縣黎璐瑭結緑鼂采砥阸瑻璷枝斯采璿瑰􅶨瑶玪長玗琪尾天智龍輔璆琳赤瑕璑㻒嬰垣㻬琈瑬黄瑭璑美玉也碔夫琨珸瑊玏玪唐碧琇㼆美石也𤣥厲黑石也須丸赭石也礙瞿青石也硨磲碼碯靺鞨水晶琅玕火齊玫瑰雲母流離鎕銻異石也夜光隨侯江歴莫難木難瑟瑟寳珠也頓牟琥珀也駭雞犀角也銅勒石膽也僂句昭兆寳龜也銀晶鐐也羽羽澤也推青膚青也厱諸礛諸磫􅮍礪也駢雅卷五
