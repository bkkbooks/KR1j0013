body:
  text: 欽定四庫全書駢雅卷一明朱謀㙔撰釋詁蔘綏恆慨羞繹漭沆紛母洸潒厖鴻恢台莽䍚聊浪昧莫瀾汗盤礡敞沆漾䆸宏酆琅扈扈實實廣大也巍嶢陮隗崝嶸業峨贅顤崝嶮魁堆崴嶉峭嶢峥巑岏掃霓屹崒崴嵬茗邈􅾊􅒈岝峉髙也鬱熙融裔淋離镽餑䭒姌嫋倰儯䧒隑僥僺镺悠悠長也黋朗倏爚效烓汨越煜霅焯爍裳裳光明也郁育殷轔殷賑縝紛沸渭豐沛璀錯盛多也昳麗邠盼彪炳光豔也菳額糝爽豐彤虺對蔚蓲蘛敷蕍豐芙忿葦熒郁蔓茗蠄爥馮戎鬱鞅櫢檽茂盛也繽駢夥夠磊珂驞駍沸卉衆多也徯醯冉鎌竨覱㒈嶤􅒈𣙗刖搖刖砧屹􅝝業業翹翹危險也泓宏㷴落谽呀卻脟魁滔蕩谽閕大也邅回連嶁涴演連犿委曲也柴虒偨池茈虒獵攦㡸庌陸離岒峨崰嶷崼􅒈儳互攜互回沉參差差池不齊也蛙律權輿始也瑟縮鬱伊䅩攝葉儲與傗㑉臠卷不伸紓也𣙗􅝨超搖震蕩反側埫塎儰仡􅙚侼僁佛鬱塞塞迹迹屑屑省省不安也鍡鑸崴魁輆軩繒綾碌鏃崴㠢溛瀤不平也舒勃攎宛灘敷與舒展也輪菌離奇骫骳紆軫蜿蟺茷骩盤屈蹇産蟉蚪屈曲也崱屴嵫釐崰嶷砧􅑇􅟬隗巀嶭峌􅒈嶊崣霄雿巊溟鬱􅔍􅵏崔􅱕􅱓岒嶙髙峻也曶霍曄踕汨活憿糴搖扇激嚁宓汨倏恍靸霅馺娑怵㲋䨹昱殉儳趨倏晀疾速也踔絶蕭曼登閎參寥髙逺也嶺巆嶙峋輵解􅛜嵃嵑岢兀嶁岪蔚􅲡􆀞嶋㟅􅤹崟聳峭也駢衍鴻絅濔迆鮮扁蟬嫣舄奕繟聯駱驛轠轤淋灑虹洞連屬也旖旎紛緼葳㽔翕赫滭弗咇茀瀖濩砰隱盛也鍖銋佚蕩佚惕提僈愈綎欵段逫律嘽腲腇佁擬殟殁翕習由衍優受伎伎􅥕􅥕扏扏繟繟爰爰舒緩也奇邪譎觚奇賅俶儻非常也窅窊寢䤁窵窅懿濞䆞窔庨窖窊巧老嶒屹窐寥幽邃也崛崎斗辟崥崹婩斫峭巘險絶也緊絭樛流黝糾運裛鄰菌繚繞也緯繣㦎軫戾乖刺解垢勃豀擊戾違忤也萑蔰爛汗斐尾璀璨瞵㻞華采也翁薆墆翳蘱黝䨹芘菞暗靄隱蔽也偃衍撇曳絺索羅畏彌澥颯膠葛屑窣紛泊霍繹卉歙瀏蒞和囉雜遝紛沓也愴囊逢俉蜂午渾殽駮樂頡滑駁犖錯雜也仿佛放􅜜亄費僾俙髣佛依俙疑似也靃靡荏弱猗狔阿那柔弱也綝纚轔囷簏簌騷殺森哆垂覆也覭髳佛離羃歷蒙蘢帡幪芘覆也蓶扈蘣熒阡眠芊萰蓊茸菲薇蔥芊茂美也毗劉暴爍蘀􅓦歷牢落雕疏也辛夥委輪豳㚊夡􅢲􅾬陾陾甡甡薨薨增增衆多也蹀佹藴嗇磊䇏繁慣臨柴摧嗺戢孴復陸匒匌涾湤厭躡疊積也惃愂澩㺒薴悴蓼擾緸冤弊摋龍茸糾亂也雍雍優優􅌈􅌈逢逢騂騂和適也帽憑邯淡豐寧馮馮盛滿也巍􅲋砐硪險戲林岑􅤢嶵嶄巖嵒齬巉嵒各落嶚刺危峻也紛溶簫蔘橚爽橚矗橚槮孑霓崙菌竦特也閻易㒑僓魁岸扈冶魁梧褒大也嵺廓寥廓落豁閕瓠落廓空虛也解果厄薛狹小也䂕短小也傖囁穰檽猥瑣也么髍區區微末也佌佌瑣瑣米鹽叢脞細碎也屈䫔矲短促也㒔㑛僕遫短陋也邊橑裔旅末也燾奡桔桀睽罛庨豁歇欻髙廣也潰虹泮汗滇㴐冥漭渺沔皓溔潢漾渺漫也漰湱澩灂􅲜潰濩㵗㶔滎瀯泧郭漩澴紛湢㳁濆灅激涌也泓泫洞澋涒鄰峾淪㘤潾槃辟蘋縈回旋也潏湟淴泱漻戾㶖㴸淢汨㴸瀹漂疾也須挾斯敝裂也怗懘敝敗也髺墾跀傷也薜暴墳裂也煙邑傷壞也譙譙翛翛敝殺也搬擭檹匜不正也隅差隅眥削殺也罷池旁穨也藞䕢偏仄也膠盩邪屈也宛廷陀靡邪長也迆揚邪起也陂阤貏豸邪平也溭淢吸哦潭瀹濯顄淡溶㵝動蕩也瀏濫湫漻焭激淡濘泚清靜也囦泫奫潫皛溔深廣也嶰壑􅡲㟋深平也窈藹深逺也嶆深空也沕穆深微也窅眇深極也紆鬱曲深也峭蒨繁深也􅗒襹紬密也軋芴緻密也緁擸鱗淪棽儷駢次也欐佹駢纍也肸蠁頒斌扶疏鋪于分布也弸彋張設也綿攣𥿃袽耣􅾂纒絯綢繆繫者也黮暗䵯不明也殄沌旁魄混同也瞿瞿梅梅不審也穆忞隱閔無形兆也溫汾菌蠢結聚也踧沑蜿蟤蹙聚也壙埌儻莽壇曼寬廣也鱗眴無涯也廖梟窂泬寥空虛也坱圠莽沕也伴仠鉏鋙詭戾乖忤也憤竅庘厄隘也剽姚徑疾也輕訬捷也聿皇輕疾也扶輿猗委也配藜披離也方攘泮散也􅦆狎獵也颯沓屈折也摳揄輅旋轉也蹇産盤屈也猭連延也鞈匝圍繞也盤盓旋繞也懕懕媞媞安也祁祁遲遲徐也艮磑鍇鑙礣砎堅也繞霤險固也鈵董錮也􅜷歇涸也緣廢也杼蕆逞解也攈托捗攎收斂也拘録檢押櫽括也摸蘇廋疏搜索也皋牢籠落也甹夆掣曵也踦區藏匿也覼縷次第也欐佹支柱也斯誃離也閻笘開也離灑鏤鎪也贏鏤雕巧也鋭銀鑽研也離婁疏朗也劫悟分明也岒營嵢岈幽深也睄窕幽暗也􅬵􅺌閫奧也悠暗微眇也寂靜也岑寂髙靜也爽塏髙明也爣閬寬明也耿介光大也赫戲炎盛也磷亂韡韡光耀也龍邛脟圈繚戾薄擊也濎濘湁湒沸溢也辟易歷僻開斥也􅯹唐逮相及也黈益增衍也汪濊饒多也瀿瀷暴溢也镺蔓盛長也奇羡曼羡餘贏也蠆芥葪介蒂也踦嶇傾倒也夷靡穨弛也偃却偃蹇也穨唐隤墜也榆楕脫也陵夷微替也荏苒漸盡也幡纚紛猋飛揚也攪搜澩捎振動也躍竦發也涫􅘺動涌也駚􅱐跳撲也㱡掣縮也訬儈擾也拂汨鼓動也硉矹轉動也扞搷揚也僁搖也稱稱格格舉也案衍窏洝窊下也窳圔抑下也泱瀼渟淤也畛挈澤濁也磽狹瘠隘也淟涊偎涹薉濁也玢豳效昈文理也頵砡齊也拒折方也拘罷圜也䡩賢也疏糲粗也趙肖小也匾㔸薄也言言仡仡髙大也毣毣微薄也啿啿豐厚也褎褎軫軫盛也馺遝壯也沛艾駊騀魁偉也跌宕放逸也郅偈髙植也彌縫補綴也嬛蟬䌪撚未續也顗頠靜也穵豂深也夷易平也岧嵽超忽逺也威夷阻也禕逶蛇迆也搬㨏撓挑婉轉也旁唐盤礡也周章遍涉也沇溶淫鬻繁鬱也參談翋􅢣羣隨也磑磑崇積也枚枚礱密也笢笏繁密也漨浡煩鬱也籍籍紛聒也魻衆飭也賱富有也歁不滿也䐒不密也碨柍不散也不淨也弔儅不常也癡𤶠不達也搖祖上也築里匹也諈諉纍也緍綿施也僉怚劇也萃離時也􅞋殄合也裔歷相也摵㨖到也忽達芒也㩩挻竟也婐𡛖委也盧牟規模也坻鄂畔際也憣校變易也翔實詳核也尉藉安置也鍛鍊成熟也泛瀲浮遊也炊纍動升也滯沛奔揚也卓犖超絶也恤削戌削也膕朏曲卻也泌瀄相楔也麗爾華縟也涎涎光澤也班駮雜色也䒍䒎無色也种襜詳贍也堇堇少也爛漫消散也欿傺陷止也繾綣纒結也頎典堅忍也清躡急也憵朴猝也羞厲熟也倐忽疾也趨趙惂惂久也存存萌萌在也蓁蓁孽孽戴也穠穁芳也安難溫也淒滄寒也煦煅熱也苦翕熾也燉溷鬱熱也烴燍焦灼也淡澉灑滌也瀧涿霑漬也沕潏流溢也崔隤蹉跎也間關逼硋也卷婁拘攣也潎洌迅疾也呹肸疾散也委鬱垂披也滑稽轉利也汍瀾闌干下垂也暗㫲靉靅昏濛也埵堁塵翳也䆹竉暗也熢㶿怫鬱也駢雅卷一
