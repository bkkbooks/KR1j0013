body:
  text: 欽定四庫全書駢雅卷七明朱謀㙔撰釋蟲魚螳蜩螳蛦巨踦蜋蜩䗁蛣蟬也麥蚻麥截蛪蚼小蟬也蟧馬蜩大蟬也暗蜩瘖蟬也龎降青蟬也腹育蟬蛻也蛥蚗螇鹿蛉蛄虭蟟蝭蟧蜒蛷蟂勞蟪蛄也蒲錯蚟悉螄犨雞蜻􅖹趣織也寒螀䗿母蛩也蟅蟒蝗也蠰溪土螽也蝑舂黍虴蛨蚣􅱁蚱蜢也螇蚸螽也負勞白宿桑根胡黎赤卒絳騶蛜江雞􅩜莣蝍伶青蛉盯蛵蜻蜓也莫貈蟷蠰不過巨斧齕疣研父馬敷螳蜋也􅡯蟭蜱蛸螵消鳥洟冒焦螳蜋卵也蛣蜋天柱弄丸蜣蜋黑甲蟲也蜉蝣渠略天牛長角甲蟲也齧桑齧髮蠰也蟥蛢緑甲蟲也輿父守瓜黃甲小蟲也蛄䗐強䖹米蠧也飛廉委黍常羊負盤伊蝛鱉兒也秦渠暉夜丹良丹鳥景天宵蠾熠耀螢也天螻杜狗蛞螻炙鼠螻津姑蟓蛉螻姑也樗鳩樗雞莎雞也果螺蚴蛻蒲盧蠮螉土蜂也蜚零木蜂也留師竹蜂也螽藪蜂房也壺螽蜜蜂也魚伯蟱􅘿􅝒禺蠋青蚨也蟙蟔服翼鼠蝙蝠也胡螓大蠅也魂常木虻也白鳥蚊也鳳車大蝶蝶也檀末小蝶也蠀螬䖭蠾蝤蠀當齊蝖蟦蝖蛭蛒資􅠸尺蠖齊蛣􅔒勃蠐地蠶也步屈螟蛉桑蟲也蛅蟖瘌也附引蜸巨白蚯蚓也蝍蛆吳公也蚨虶蚰􅣓蚓衍䗅􅫡䖡蚭蛉窮入耳也商距馬蠲蛆渠截蛆馬踐百足蚿也大者謂之馬蚰一曰馬陸蠼螋長足吳公也蠦􅫢蜤蜴祝蜒蚵蠪蠑螈號蜼守宫螔䗔易蜴蝘蜓蛇醫也大而能鳴者曰蛤解江東謂之蛤蚖汝潁謂之蛤􅖚􅠴䗇蛙鼓造鼁􅖚瞻諸螻去甫苦蠪詹蜍蝦蟇也耿黽􆂵蛙也活東活師懸鉤玄魚科斗蛙黽子也陵蠡蛞蝓僕纍蝸牛螔蝓瓜牛也蜁蝸小螺也縊女蜆也蝜布毒蜆也蛤梨含漿蚌也復纍魁蛤也蘇岸馬刀馬蛤也瓦瓏海蛤也魁陸蚶也餘貾餘泉文貝也車螯大蛤也蠾蝓蝳蜍网上蛛蝥社公蝃蝥鼅蛛也䖦蟱草木間小鼅蛛也螲蟷顛當蛟煬土鼅蚌也壁錢壁繭也蠅豹壁虎也蠨蛸喜母也晏青螌蛩班蝥也地膽蛇要青蠵芫菁也蚼蟓蛾䖹蚍蜉也􅵙􅲇蓬活地脾沙蝨也厥昭虷蟹孑孑蜎蠉蛣蟩井中赤蟲也至掌水蛭也杜伯蟹蝎也商何蛶也蛄詣杜蛒也焦冥蠛也復陶蝝也國貉土蛹也烏蠋橘蠶也䱎𩶶鮪也仲明鱨也胡鱅鱮也當互鯦也左介比日也河伯烏賊也鯤鮑印魚也鱄䱐江豚也鯸鮐河豚也忽雷鰐也神守鱉也石鏡海靼水母蛇也蛺燮三也冉遺鮯鮯皆六足建同四足浮胡章舉皆八足鰼鰼十翼何羅一首十身􅛈魮如銚鳥首修辟如黽鱕䱜鼻有橫斤鱬鰗如鳶橫公夜能化人王餘半身皆異魚也石斑黃靈槌頭伏念婢屣奴屩織杼戴星銅哾蕃踰鱖帚䱦鯺䱐䰽饋尾土拌皆海魚也蜋蟻轉帶擁劍移角姑勞石蜠撥棹望潮竭朴蟹也鰌蝥蘆䱐巨蟹也彭螖長卿招潮倚望蚽江小蟹也璅蛣之腹有小蟹玄衣白若玉靈玄緒玄佇滋夷觜蠵龜也珠鱉如肺石􅎕如龜腳石如鋸錯􅡷􅠦如䉬海术口在背上􅔢鼊如笠土肉如臂海鏡合生海月如鏡石矩長足白特如蛟旋龜鳥首􅦄龜鵝首齧犬蝦姑如蜈公蘆雉似蛤蜊方諸大蛤文鰩長尺許有翼海鷂有肉翅皆水族也龍之屬有鱗曰蛟龍有翼曰應龍有角曰龍無角曰龍龍生三子一為吉弔龜之屬一神龜二靈龜三攝龜四寶龜五文龜六筮龜七山龜八澤龜九水龜十火龜肥遺如蛇六足肥􅖆如蛇兩身蜛蝫一首數尾䖺䗤蛇身魚翼䎼聽齧人如蜥易璧鏡五足皆毒蟲也陵舄之草為鬱栖乾餘骨之沫為斯彌疑即鳥洟食醯為頤輅疑即醯雞久猷為黃軦久竹為青寧疑即青蛉腐蠸為瞥芮疑即蚊蚋過街蟅也慕光飛蛾也以蟅為雌釋鳥長離瑞鶠鸑鷟鳳也鷫鷞鴰筒鵕鸃廣昌鷦明德牧鳳屬也鳳晨鳴曰發明晝鳴曰保長舉鳴曰上翔集鳴曰歸昌昏鳴曰固常雄鳴曰即即雌鳴曰足足論緯云鳳行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰郎都雞趣鸞也首翼赤曰丹鳳青曰羽翔白曰化翼玄曰隂翥黃曰土符撥榖擊榖結誥鴶鵴􅬹縷郭公布榖也戴任戴南鵖鴔􅫁鶝澤虞戴鳻鶝鴀尸鳩也鳺鴀鷱鵈嗶啁楚鳩䳕鳩佳也鶌鳩鶻鵃斑鳩也冦雉泆泆鵽鳩也獨春定甲城旦倒懸䳚鴠盍旦求晨鳥也倉庚鵹黃楚雀商庚摶黍黃栗留也譽居鵯鶋鸒斯反哺鳥也鶷􅗾白頭烏也伯勞鵙也鷑鳩鵧鷑烏鵙也鷦􅛯鸋鴂果騾桑飛女􅬡巧婦桃雀過羸工爵襪雀桃蟲也盧虎剖葦鳭鷯也鷾鴯玄鳥燕也嘉賔雀也牟母䳺也鳱鵠神女鵲也反舌百舌也寒皋鴝鵒也鷤鵙鷶子鳺鶗鴂杜鵑謝豹杜宇也懷南逐隱鴣也􅨧蛦山雞也斫水鴷也歸飛比翼也秩秩海雉也避株吐綬鳥也桑扈竊脂也棘雇竊丹也晨風鸇也青骹鷹也䳻鷲雕也題肩鶙肩擊征負雀籠脫鷂也王雎鶚也楊鳥白鷢也扶老秃鶖也負釜鸛也絲鷯慈老也汙澤鵜鴣淘河也鵁鶄鳽也鸕鷀鷧也獨豹鴇也倉􅕯雁也鵱鷜野鵝也鶻􅕭石檄开零野鳬也雍渠錢母連錢鶺鴒也水梟鷗也煩鶩􅵒鴨也須鸁鸊鷉也魚鵁鴢也鴛鴦鸂鶒匹鳥也鴰鹿鴰捋麋鴣錯落鶬也針疵水札屬玉皆水鳥也雜縣乘風爰居海鳥也鵂鶹鵋鶀鴝鵅舊留鴟久鴟舊雞鵂角鴟也􅣽鷼盧休老鵵茅鴟萑也流離梟也鶈瞿怪鳥也鉤星隱飛姑獲也蒼鶊鬼車九頭鳥也離延居鸇雀皆怪鳥也魂鵩鳥也運日隂諧鴆也欽原蠚鳥也畢方兆火鳥也如鶴一足蠻蠻如鳬一翼勝遇如翟而赤兆水鳥也商羊一足長喙兆雨鳥也潔鉤如鳬而鼠尾跂踵如梟一足兆疫鳥也鬿雀如雞虎爪食人鳥也橐􅖦一足瞿如三足􅜥鵑如烏鳬徯如雞人面鳥也青耕肥遺御癘鳥也䳅餘御火鳥也竦斯當扈白鵺象蛇皆雉屬也鵸鵌鶌鶋鴣􅨊精衛皆鳥屬也蟂渠鴒䳩山雞屬也除溪賔師鴝鵒屬也灌灌鳩屬也昆雞鶴屬也獨隼屬也嬰勺鵲屬也螢鼠雞屬也􅡀􅝐六足鵸鵌三首酸與三足周周大首鵹鶘數斯皆人足庸渠帝渠也澤特皋雞也端琦諫珂也鶝鶔羿鸛鷒也吉了鸚鵡也鸏長喙也重精世樂皆靈鳥也善芳奇幹鳥也希有大鳥也焳苦姑意怠皆海鳥也靈雀蜜母也蚊母吐蚊烏也夷由飛生鼯鼠也澤虞婟澤也文鶾天雞也蜜肌英雞也眥竈皂帔雚雀也􆒒飛鸓也車搹鷦杔也鶀老癡鳥也餔敊鴩也早秋白唐鶉也斥鷃鷃蟬也瞿鶻嘲也黃褐侯緑鳩也秋侯子雞雛也爥夜翰音雞也山菌子田雞也鷂宇顧影鳥也海鷂摶蛟鳥也魚狗鷸也石肝鼠法蝙蝠矢也蜀水花鸕鷀矢也大鵹少鵹青鳥西王母之三鳥也于闐謂金翅鳥為􅠫鱗釋獸麟牡鳴曰遊聖牝鳴曰歸和夏鳴曰扶幼秋鳴曰養綏一角為天鹿兩角為辟邪無角為符拔亦謂之挑拔閭麋大鹿也四角為􅙱如四角而白為夫諸兩頭謂之荼首鹿頭龍身謂之飛遽麋而魚目為妴胡麋角前出為麡狼豕頭而牙為無損於於檡伯都李父山君虎也毛淺者謂之虦貓有角者謂之委虒大而長尾曰酋耳長尾而五采曰騶吾九尾而人形曰開明虎而翼曰窮奇虎而人面曰馬復青虎謂之羅羅郭椒丁櫟駛牛也州宿周留水牛也日及月氏牛也紈牛每牛小牛也郭犂無角牛也似牛而白尾曰那父赤尾曰領胡馬尾曰精精牛而虎文曰軨軨大而食鐵曰齧鐵牛四角人目曰諸懷人面而馬足曰窫窳四角而白曰獓􅧝音如嬰兒曰犀渠蝟毛謂之窮奇是皆食人獸也狌狌人走長右四耳舉父文臂嬻嬒文身足訾馬蹄有巤皆禺屬也朱厭白首赤足雍和黃身赤喙騰逺獑猢風母前兒皆猿屬也梁渠白首虎爪朏朏白尾有巤蒙頌捕鼠皆貍屬也􅨓狼白尾長耳獙獙鳥翼朱獳魚翼乘黃背上有角狐屬也孟極文題諸犍長尾人首豹屬也狗兔屬也騰黃吉光䮡駽翠黃飛黃訾黃神馬也吉量吉皇文馬也遺風啓服肅爽飛兔要􅒁齧膝乘旦紫蕪緑蛇騏驎昆蹄驒騱昆駼驡􅳟皆良馬也宜乘減陽茀方闋廣皆旋毛馬也玄駒裊駱果下欵段皆小馬也騀騼野馬也䮂䮧叱撥胡馬也雖馬䑏疏一角馬也兹白鋸牙馬也鹿蜀虎文馬也馬而人面鳥翼曰孰湖四角牛尾曰峳峳白而一角謂之􅖃馬赤驥盜驪白義踰輪山子渠黃華騮緑耳周穆王之八駿也騮華騮也赤蘎赤驥也白白義也朱駮金喙走狐駃騠飛鴻野麋腹丹駣汗血巨虛皆駿馬也漠驪驢也𩢷騾也馬父驢母曰騰驢父牛母曰馲􅦢似驢而文謂之福祿韓盧宋㹱鵠倉修毫釐睫青曹白望狼狐狂獖如黃皆良狗也露犬飛犬也蝸斗食火犬也山􅏈人面犬也從從六足犬也吳羊白羊也夏羊黑羊也羺䍲輝胡羊也繭耳小羊也羊四角為土螻九尾而四耳曰猼訑人面腋目曰狍梟一角謂之䍶䍶赤鬣謂之蔥聾一角而神謂之觟䚦伽那象也執夷貔也􅧯狢也狻麑獅子也猲狚巨狼也荒鹿麈也子熊也阿紫狐也龍雀飛廉也仲能神鼠也射干飛狐也猰貐㝣寙也蒙貴蒙頌也狒佛吐螻梟羊山都也白澤角端能言獸也歸終知來獸也山膏善詈贛巨善笑蒲牢善鳴山繅善語隨兕凶獸也見者不出三月破鏡貙屬也反噬其父墠微虔已黃要也長逐其母狤􅠝火獸也磎鼠氷獸也蟃蜒長獸也狸刀距豚也狪狪珠豚也蠪蚳角彘也聞􅡁黃彘也當康牙豚也鱉封兩首彘也䟣踼屏蓬皆兩首獸也流沙之東有三獸相并曰雙雙皮樹在子闒非合窳皆人面獸也灌灌九尾狐也蠪姪九首狐也皆食人蠱雕如雕而戴角文文如蜂而反舌􅦺即如膜犰狳鳥喙獨𤞞如虎而馬尾猾褱如人而彘巤礋獸身而羊首溪邊如狗孟槐如貆石豰如狢活褥地如鼠威夷長脊而劣果然愛其類皋比虎皮也駢雅卷七
