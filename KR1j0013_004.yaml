body:
  text: 欽定四庫全書駢雅卷四明朱謀㙔撰釋器鈷䥈鵭錥鈳䥈銼􅟋釜也酢鎦甑也炊䉛漉米者量鼓授米者𥫱篅盛米者留犂飯匕也安哉食器也蘇鉝胡食器也䀂大盂也瓿㼴缶也銚鋭盌也康瓠甈也㼬㼳㼨㼺耳瓶也甔甀小缾也瓿甊服匿小甖也鴟夷豐侯酒器也犧象黄目尊也棜禁承尊者觛經程鑿落飲器也䇨䉶酒篘也雕篹鏤柄籩也桶􅿽箸筩也梡嶡俎也夏屋大俎也鎡基鐲鉏也鹵斫大鉏也柌橿鉏柄也渠挐欋疏渠疏杷朳也磟碡平田器也榛杷齒也鈐䤻大犂也鋁鈶鑖䥡鏃也欇殳擊榖杖也桔橰􅪀轤龍骨汲具也􅦽畚也簦䉕笠也䃊磑也㼮㼽磥磨也指南記里鼓白鷺鸞旗辟惡皮軒耕根四望畫輪黄鉞豹尾建華皆大駕之副車也金根大輅也武剛􆒘䡙戰車也渠衝攻車也闒豬獵車也蠃蘭喪服車也道軌鹿車也蔥靈輜車也蟬匷雕車也俾倪車杠也靯􅫜車薦也隠囊車中絥也曲綯車紂也􅦶籠車枸簍也箳篂車􅞴檔也鍋錕轂釭也頭軒薄轆轊栁車也餘皇須慮艒宿帛蘭䑦􅑳䑴艃青翰五會晨鳬舽舡浩漂艎舟也舴艋䑬舸小舟也􅯕艡蒙艟冒突露橈戰船也艆䑼海船也斗挹水者牂牁􅍻也五兩候風扇也箰律角黐擌捕鳥者籠􅮵瀀涔典梁取魚者䍓兔罟也罜䍡魚網也䈲籛笱也箷竹網也簽籝籠也笭箵小籠也編輿食輿竹箯也纆牽馬轡也䩞鞢茸鞍具也羈馬勒也扇汗排沫勒旁鐵也龍兹龍疏蒲蓋席也笭䇸竹席也桃笙細簟也籧曲籧篨篕掞筕唐倚佯麤簟也褡小被也㡆幞帳也㡙㡘也伏虎楲窬溺器也糾纆索也師比犀帶鉤也蒙須蒯緱也條達雜組也流蘇纂綵也鉜鏂籢飾也銀鐺鎖也鋂環也銶䋟鍼也撲滿蓄錢具也専璇簙毒也瓊畟骰也樗蒲六博格五蹴鞠藏鈎擊壤彈棋四維夾食悁悶詭億戲具也握槊博簺雙陸也窟􅕲魁礧木偶也殺青炙簡也笘䈎䉸觚也陟釐赫蹏􅩴㡗紙也不律筆也隃穈墨也簧牌簡䉳籍也傅别劵也過所符𫝊也零丁事狀也㔼卯簨牡枘鑿也銚鋧小鑿也剞劂曲刀也梓宫天子棺也黄腸柏椁也蔞翣聚僂棺飾也楄柎苓牀也咸繩棺束也堲周土棺也罨盂東夷棺也芻靈殉偶人也豐碑桓楹下棺具也牆居薰籠也方麯便面也靈節楖櫪杖也盨負戴器也䈿軬帶也裺囊㡞兜㭺篼飲馬橐也㭕极驢負板也㸡遏水版也露卯屐齒也桁楊長械也椄槢桎梏梁也蕃弱繁弱大屈烏睪烏號白鷴良弓也谿子巨黍距來少府時力大黄參連黄間弩也懸刀弩牙也㯕弩楔也鉀鑪飛䖟忘歸申孫金僕姑夏服鶉尾䈯㕟簫衛飛鳬電景三鐮平題䈶䇯矢也胡靫櫝丸步又矢臧也含光承影霄練辟閭獨鹿屬鏤步光鍛成磐郢輕吕莫門燕支古劍也龍淵太阿工市楚劍也干将鏌邪吳劍也純鉤湛盧豪曹魚腸巨闕越劍也棠谿墨陽合伯合􅉠鄧師宛馮韓劍也斷蛇駭犀蔡倫葵偷漢劍也飛景流彩華鋒魏劍也白虹紫電辟邪流星青冥百里吳劍也匕首短劍也䃿襓劍衣也孟勞百鍊青犢漏影靈寳含章素質露陌龍鱗善勝成勝白陽徑路寳刀也鞞刀􅮰也䪝􅭕刀柄韋也鈭錍斧也大曰關斧小曰蕭斧椹質斫具也雍狐㦸也鹿觡鈎也糟柔木矛也䂍槊瓝槊也箛搶也終葵椎也吳魁露見犀渠果科自障盾也彭排捍敵者鶴䣛屈盧勃盧宛景錟鏦矛也棨㦸前驅者渠荅鐵蒺藜也藺石雷礮也虎落竹遮也蘭錡兵架也刁斗警器也兜鍪鞮鍪首鎧也錏鍛鏂銗頸鎧也闕鞏𤾉夷鮫甲也大白大赤蝥弧靈姑銔洪頤徽章旗也星施旄珥也肥胡祀姑幡也赤仄榆莢白撰鮫文鵝眼綎環錢也雷鼓以祀路鼓以享靈鼔以社鼖鼓以軍鼛鼓以役晉鼓以金奏小曰朔鼔馬上曰提鼓於朝曰登聞鼓於府寺曰朝晡鼔在村墅曰枹鼓在邊徼曰警鼔石鼓曰神証候鼓曰守鼜都曇毛員答臘雞婁夷鼓也天球玉磬也樂石浮磬也丁寧鉦也琅璫鐸也錞于金錞也将于似缶方響似磬埒竽似小鐘箜侯似瑟盧沙似簫清角鳴㢘脩况籃脇號鐘自鳴空中繞梁緑綺清英焦尾怡神靈開靈和古名琴也雲和小筝也蕃羸四絃瑟也奚琴匏琴胡琴也中鳴胡角也觱篥悲篥笳也柷敔謂之椌楬舂杵謂之頓相鐘虡謂之乗風鐘懸謂之旋蟲鐘林鐘也小吕仲吕也圜鐘夾鐘也扶來立本駕辯伏羲樂也扶持下謀神農樂也咸池雲門大卷黃帝樂也大淵少昊樂也六莖顓頊樂也六英帝嚳樂也大章堯樂也大韶舜樂也大夏禹樂也大濩湯樂也大武周武樂也五行夀人秦樂也文始武徳昭容禮容安世嘉至四時昭徳盛徳雲翹育命巴渝大予漢樂也武頌正世迎靈鳳翔靈應昭武昭業魏樂也秦漢有百戲雜樂曰魚龍蔓延假獸也髙絙鳳凰假禽也安息五案騰卧盤䀂也都盧尋橦縁竿也跟挂腹旋舞絙也江左又有紫鹿跂行齊王捲衣笇鼠扛鼎等伎五射一白矢二參連三剡注四襄尺五井儀五御一鳴和鸞二逐水曲三過君表四舞交衢五逐禽左九數一方田二粟米三差分四少廣五商功六均輸七方程八贏不足九旁要又有重差夕桀勾股之數駢雅卷四
